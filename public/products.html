<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produits | Gestion-Stock</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">&#128230;</div>
        <span class="sidebar-title">Gestion-Stock</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item" data-page="dashboard">
          <span class="nav-icon">&#128202;</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="/products.html" class="nav-item active" data-page="products">
          <span class="nav-icon">&#128230;</span>
          <span class="nav-label">Produits</span>
        </a>
        <a href="/stock-movements.html" class="nav-item" data-page="stock-movements">
          <span class="nav-icon">&#128203;</span>
          <span class="nav-label">Mouvements</span>
        </a>
        <a href="/suppliers.html" class="nav-item" data-page="suppliers">
          <span class="nav-icon">&#127970;</span>
          <span class="nav-label">Fournisseurs</span>
        </a>
        <a href="/purchase-orders.html" class="nav-item" data-page="purchase-orders">
          <span class="nav-icon">&#128196;</span>
          <span class="nav-label">Commandes</span>
        </a>
        <a href="/alerts.html" class="nav-item" data-page="alerts">
          <span class="nav-icon">&#9888;</span>
          <span class="nav-label">Alertes</span>
          <span class="nav-badge" id="alerts-badge" style="display:none;">0</span>
        </a>
        <a href="/settings.html" class="nav-item" data-page="settings">
          <span class="nav-icon">&#9881;</span>
          <span class="nav-label">Parametres</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-item" onclick="toggleTheme()" id="theme-toggle">
          <span class="nav-icon" id="theme-icon">&#127769;</span>
          <span class="nav-label" id="theme-label">Mode clair</span>
        </button>
        <button class="nav-item" onclick="logout()">
          <span class="nav-icon">&#128682;</span>
          <span class="nav-label">Deconnexion</span>
        </button>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar">
        <button class="hamburger" id="hamburger" onclick="toggleSidebar()">&#9776;</button>
        <div class="topbar-title" id="page-title">Produits</div>
        <div class="topbar-right">
          <button class="topbar-btn" onclick="window.location.href='/alerts.html'" id="topbar-alerts" title="Alertes">
            &#9888;
            <span class="topbar-badge" id="topbar-alerts-badge" style="display:none;">0</span>
          </button>
          <div class="topbar-user" id="topbar-user">
            <span class="topbar-avatar">&#128100;</span>
            <span class="topbar-username" id="topbar-username">Admin</span>
          </div>
        </div>
      </header>

      <main class="main-content">
        <div class="toolbar">
          <button class="btn btn-primary" onclick="openProductModal()">&#10010; Ajouter un produit</button>
          <button class="btn btn-secondary" onclick="openCategoryModal()">&#128193; Categories</button>
          <button class="btn btn-secondary" onclick="window.open('/api/v1/export/products?token='+localStorage.getItem('token'),'_blank')">&#128229; Excel</button>
          <button class="btn btn-secondary" onclick="window.open('/api/v1/export/products/pdf?token='+localStorage.getItem('token'),'_blank')">&#128196; PDF</button>
          <input type="text" class="search-input" id="search-products" placeholder="Rechercher un produit..." oninput="searchProducts()">
          <select id="filter-category" onchange="loadProducts()">
            <option value="">Toutes les categories</option>
          </select>
          <select id="filter-status" onchange="loadProducts()">
            <option value="">Tous les statuts</option>
            <option value="low">Stock bas</option>
            <option value="out_of_stock">Rupture</option>
            <option value="overstocked">Sureffectif</option>
          </select>
        </div>

        <div class="card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Nom</th>
                  <th>SKU</th>
                  <th>Categorie</th>
                  <th>Stock</th>
                  <th>Min/Max</th>
                  <th>Statut</th>
                  <th>Prix Achat</th>
                  <th>Prix Vente</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="products-table-body">
                <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-secondary);">Chargement...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;">
          <div id="products-count" style="font-size:13px;color:var(--text-secondary);"></div>
          <div id="products-pagination"></div>
        </div>
      </main>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- PRODUCT MODAL -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="product-modal-title">Ajouter un produit</div>
        <button class="modal-close" onclick="closeModal('product-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="product-id">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label>Nom *</label>
            <input type="text" id="product-name" placeholder="Nom du produit">
          </div>
          <div class="form-group">
            <label>SKU *</label>
            <input type="text" id="product-sku" placeholder="SKU unique">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label>Categorie *</label>
            <select id="product-category"></select>
          </div>
          <div class="form-group">
            <label>Unite *</label>
            <select id="product-unit">
              <option value="piece">Piece</option>
              <option value="kg">Kilogramme</option>
              <option value="g">Gramme</option>
              <option value="L">Litre</option>
              <option value="m">Metre</option>
              <option value="box">Boite</option>
              <option value="pack">Pack</option>
            </select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label>Prix d'achat (MAD) *</label>
            <input type="number" id="product-buying-price" placeholder="0.00" step="0.01" min="0">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
          <div class="form-group">
            <label>Stock actuel</label>
            <input type="number" id="product-stock" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label>Stock minimum</label>
            <input type="number" id="product-min-stock" placeholder="10" min="0">
          </div>
          <div class="form-group">
            <label>Stock maximum</label>
            <input type="number" id="product-max-stock" placeholder="100" min="0">
          </div>
        </div>
        <div class="form-group">
          <label>Emplacement</label>
          <input type="text" id="product-location" placeholder="Ex: Etagere A3">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="product-description" rows="3" placeholder="Description du produit"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('product-modal')">Annuler</button>
        <button class="btn btn-primary" id="btn-save-product" onclick="saveProduct()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- CATEGORY MODAL -->
  <div class="modal-overlay" id="category-modal">
    <div class="modal" style="max-width:500px;">
      <div class="modal-header">
        <div class="modal-title">Gerer les categories</div>
        <button class="modal-close" onclick="closeModal('category-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <input type="text" id="new-category-name" placeholder="Nouvelle categorie" style="flex:1;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-xs);color:var(--text-primary);font-size:14px;">
          <input type="color" id="new-category-color" value="#3b82f6" style="width:40px;height:38px;border:1px solid var(--border);border-radius:var(--radius-xs);cursor:pointer;">
          <button class="btn btn-primary btn-sm" onclick="addCategory()">Ajouter</button>
        </div>
        <div id="categories-list"></div>
      </div>
    </div>
  </div>

  <!-- BARCODE MODAL -->
  <div class="modal-overlay" id="barcode-modal">
    <div class="modal" style="max-width:300px;">
      <div class="modal-header">
        <div class="modal-title">Code QR</div>
        <button class="modal-close" onclick="closeModal('barcode-modal')">&times;</button>
      </div>
      <div class="modal-body" style="text-align:center;">
        <div id="barcode-image"></div>
        <div id="barcode-info" style="margin-top:12px;font-size:14px;color:var(--text-secondary);"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
  <script src="/js/products.js"></script>
</body>
</html>
