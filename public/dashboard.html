<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Gestion-Stock</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo">&#128230;</div><span class="sidebar-title">Gestion-Stock</span></div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item active" data-page="dashboard"><span class="nav-icon">&#128202;</span><span class="nav-label">Dashboard</span></a>
        <a href="/products.html" class="nav-item" data-page="products"><span class="nav-icon">&#128230;</span><span class="nav-label">Produits</span></a>
        <a href="/stock-movements.html" class="nav-item" data-page="stock-movements"><span class="nav-icon">&#128203;</span><span class="nav-label">Mouvements</span></a>
        <a href="/suppliers.html" class="nav-item" data-page="suppliers"><span class="nav-icon">&#127970;</span><span class="nav-label">Fournisseurs</span></a>
        <a href="/purchase-orders.html" class="nav-item" data-page="purchase-orders"><span class="nav-icon">&#128196;</span><span class="nav-label">Commandes</span></a>
        <a href="/alerts.html" class="nav-item" data-page="alerts"><span class="nav-icon">&#9888;</span><span class="nav-label">Alertes</span><span class="nav-badge" id="alerts-badge" style="display:none;">0</span></a>
        <a href="/settings.html" class="nav-item" data-page="settings"><span class="nav-icon">&#9881;</span><span class="nav-label">Parametres</span></a>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-item" onclick="toggleTheme()" id="theme-toggle"><span class="nav-icon" id="theme-icon">&#127769;</span><span class="nav-label" id="theme-label">Mode clair</span></button>
        <button class="nav-item" onclick="logout()"><span class="nav-icon">&#128682;</span><span class="nav-label">Deconnexion</span></button>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar">
        <button class="hamburger" id="hamburger" onclick="toggleSidebar()">&#9776;</button>
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-right">
          <button class="topbar-btn" onclick="window.location.href='/alerts.html'">&#9888;<span class="topbar-badge" id="topbar-alerts-badge" style="display:none;">0</span></button>
          <div class="topbar-user"><span class="topbar-avatar">&#128100;</span><span class="topbar-username" id="topbar-username">Admin</span></div>
        </div>
      </header>

      <main class="main-content" id="main-content">
        <div class="stat-cards" id="stat-cards">
          <div class="stat-card animate-in"><div class="stat-icon blue">&#128230;</div><div class="stat-info"><div class="stat-value" id="stat-products">-</div><div class="stat-label">Total produits</div></div></div>
          <div class="stat-card animate-in"><div class="stat-icon green">&#128176;</div><div class="stat-info"><div class="stat-value" id="stat-value">-</div><div class="stat-label">Valeur stock</div></div></div>
          <div class="stat-card animate-in"><div class="stat-icon yellow">&#9888;</div><div class="stat-info"><div class="stat-value" id="stat-low">-</div><div class="stat-label">Stock bas</div></div></div>
          <div class="stat-card animate-in"><div class="stat-icon red">&#128196;</div><div class="stat-info"><div class="stat-value" id="stat-orders">-</div><div class="stat-label">Commandes en cours</div></div></div>
        </div>

        <div class="grid-2 animate-in" style="margin-bottom:24px;">
          <div class="card">
            <div class="card-header"><div class="card-title">Mouvements (30 jours)</div></div>
            <div class="card-body"><canvas id="chart-movements" height="250"></canvas></div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">Stock par categorie</div></div>
            <div class="card-body"><canvas id="chart-categories" height="250"></canvas></div>
          </div>
        </div>

        <div class="grid-2 animate-in">
          <div class="card">
            <div class="card-header"><div class="card-title">Mouvements recents</div></div>
            <div class="card-body" id="recent-movements" style="max-height:400px;overflow-y:auto;">
              <p style="color:var(--text-secondary);text-align:center;">Chargement...</p>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">Alertes stock bas</div></div>
            <div class="card-body" id="low-stock-list" style="max-height:400px;overflow-y:auto;">
              <p style="color:var(--text-secondary);text-align:center;">Chargement...</p>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
