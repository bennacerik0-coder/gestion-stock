<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion-Stock | Connexion</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">&#128230;</div>
        <h1>Gestion-Stock</h1>
        <p>Connectez-vous a votre compte</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="admin@stock.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" placeholder="Mot de passe" required autocomplete="current-password">
        </div>
        <div id="login-error" class="form-error" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-block" id="btn-login">
          <span>Connexion</span>
        </button>
      </form>
      <div class="login-footer">
        <button class="theme-toggle-mini" onclick="toggleLoginTheme()" title="Changer le theme">
          &#127769;
        </button>
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
